<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 감리 시스템 — 데모 준비 중</title>
  <link rel="stylesheet" href="../css/fonts.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #2F3C7E 0%, #1A2148 80%);
      color: #fff;
      text-align: center;
      padding: 24px;
      word-break: keep-all;
    }
    .box { max-width: 640px; }
    .badge {
      display: inline-block;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .12em;
      color: #F9C846;
      border: 1.5px solid rgba(249, 200, 70, .5);
      border-radius: 999px;
      padding: 6px 18px;
      margin-bottom: 22px;
    }
    h1 { font-size: clamp(30px, 5vw, 48px); font-weight: 900; margin-bottom: 14px; }
    p { font-size: clamp(15px, 2vw, 19px); color: rgba(255, 255, 255, .75); margin-bottom: 32px; }
    a {
      display: inline-block;
      font-weight: 700;
      color: #fff;
      background: #F96167;
      text-decoration: none;
      border-radius: 999px;
      padding: 13px 30px;
      transition: transform .2s ease;
    }
    a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="box">
    <span class="badge">COMING SOON</span>
    <h1>AI 감리 시스템 데모</h1>
    <p>업로드 → 리스크 검증 → 신뢰 점수 → 감리 보고서 발행<br>데모 앱은 현재 준비 중입니다.</p>
    <a href="../">← 발표로 돌아가기</a>
  </div>
</body>
</html>
